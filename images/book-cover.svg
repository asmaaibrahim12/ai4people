  <circle cx="220" cy="158" r="9" fill="#3b82d0"/>
  <circle cx="180" cy="165" r="6" fill="#3b82d0"/>
  <circle cx="245" cy="180" r="7" fill="#1a6fc0"/>
  <circle cx="205" cy="188" r="8" fill="#00b4d8"/>
  <circle cx="235" cy="210" r="6" fill="#00b4d8"/>
  <circle cx="220" cy="218" r="7" fill="#00a0c8"/>

  <!-- Stem nodes (green/yellow/orange/red) -->
  <circle cx="155" cy="248" r="7" fill="#6bbf4e"/>
  <circle cx="190" cy="248" r="6" fill="#40c060"/>
