  <line x1="245" y1="180" x2="235" y2="210" stroke="#00b4d8" stroke-width="2" opacity="0.5"/>
  <line x1="205" y1="188" x2="220" y2="218" stroke="#00b4d8" stroke-width="2" opacity="0.5"/>
  <line x1="235" y1="210" x2="220" y2="218" stroke="#00b4d8" stroke-width="2" opacity="0.5"/>

  <!-- Stem connections (green/yellow/orange/red) -->
