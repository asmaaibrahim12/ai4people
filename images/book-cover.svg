  <line x1="220" y1="218" x2="190" y2="248" stroke="#00b4d8" stroke-width="2" opacity="0.5"/>
  <line x1="155" y1="248" x2="170" y2="275" stroke="#6bbf4e" stroke-width="2" opacity="0.5"/>
  <line x1="190" y1="248" x2="170" y2="275" stroke="#40c060" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="275" x2="185" y2="305" stroke="#c0b020" stroke-width="2" opacity="0.5"/>
  <line x1="185" y1="305" x2="170" y2="330" stroke="#f7941d" stroke-width="2" opacity="0.5"/>
  <line x1="185" y1="305" x2="205" y2="325" stroke="#e84d3d" stroke-width="2" opacity="0.5"/>

