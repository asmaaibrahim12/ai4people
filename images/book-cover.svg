  <circle cx="108" cy="210" r="3" fill="#f0a020" opacity="0.7"/>
  <circle cx="210" cy="130" r="3.5" fill="#2060b0" opacity="0.7"/>
  <circle cx="240" cy="165" r="3" fill="#1a6fc0" opacity="0.7"/>
  <circle cx="255" cy="195" r="3" fill="#00b4d8" opacity="0.7"/>
  <circle cx="240" cy="228" r="3" fill="#00a0c8" opacity="0.7"/>
  <circle cx="140" cy="258" r="3" fill="#6bbf4e" opacity="0.7"/>
  <circle cx="205" cy="258" r="3" fill="#40c060" opacity="0.7"/>
  <circle cx="160" cy="290" r="3" fill="#c0b020" opacity="0.7"/>
  <circle cx="200" cy="290" r="3.5" fill="#f09010" opacity="0.7"/>
  <circle cx="155" cy="340" r="3.5" fill="#e84d3d" opacity="0.7"/>

  <!-- Main Title -->
  <text x="200" y="370" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" fill="#1a3a5c">
    <tspan x="200" dy="0" font-size="40">Making</tspan>
    <tspan x="200" dy="48" font-size="50" fill="#00b4d8">AI</tspan>
    <tspan x="200" dy="36" font-size="28">Work for</tspan>
    <tspan x="200" dy="30" font-size="32">People</tspan>
  </text>

  <!-- Author Name -->
  <text x="200" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#00b4d8" font-weight="700" letter-spacing="1">ASMAA IBRAHIM</text>

  <!-- Thin border -->
