  <circle cx="350" cy="250" r="1" fill="#f7941d" opacity="0.2"/>
  <circle cx="45" cy="380" r="1" fill="#00b4d8" opacity="0.2"/>
  <circle cx="355" cy="400" r="1.5" fill="#6bbf4e" opacity="0.2"/>
